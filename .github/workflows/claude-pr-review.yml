name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read # lets Claude read CI results

jobs:
  review:
    runs-on: ubuntu-latest
    # Don't trigger on Claude's own PRs
    if: |
      github.event.pull_request.user.login == 'tdakkota' &&
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Get Go environment
        id: go-env
        shell: bash
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV

      - name: Set up cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: claude-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            claude-${{ runner.os }}-${{ runner.arch }}-go-

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          prompt: |
            Review this pull request for a Go application. Focus on:
            - Correctness and logic bugs
            - Error handling (Go-specific: unhandled errors, missing checks)
            - Resource leaks (unclosed files, connections, goroutine leaks)
            - Idiomatic Go (naming, interfaces, patterns)
            - Security concerns
            - Test coverage for changed code

            Post inline comments on specific lines where you find issues.
            If no significant issues are found, leave a brief summary comment.
            Do not flag style issues already enforced by linters and formatters.

            Do not review or even load generated files in directories:
            - `internal/lokiapi`
            - `internal/otelbotapi`
            - `internal/promapi`
            - `internal/promproxy`
            - `internal/pyroscopeapi`
            - `internal/sentryapi`
            - `internal/tempoapi`

          claude_args: |
            --max-turns 20
            --allowed-tools "Bash(golangci-lint run:*),Bash(golangci-lint fmt:*),Bash(go build:*),Bash(go test:*),Bash(go vet:*),Bash(gh pr:*),Bash(gh issue:*),Bash(git log:*),Bash(git diff:*),mcp__github_inline_comment__create_inline_comment"
