# Caching reverse proxy in front of the single node-exporter.
#
# vmagent turns one node-exporter into BENCH_NODES synthetic hosts, all scraping the same endpoint.
# Past a few hundred hosts that melts node-exporter (thousands of concurrent full /proc+/sys
# collections). This proxy collapses every host's scrape onto ONE cached node-exporter response:
# node-exporter is hit at most once per TTL (in the background), while vmagent's N scrapers always
# get an instant copy. Every host already receives identical values today, so caching changes only
# the load, not the data.
#
# Verbatim from /src/oteldb/benchmark/config/nginx/node-cache.conf.
events { worker_connections 8192; }
http {
  access_log off;
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=ne:10m max_size=64m inactive=2m;

  upstream node_exporter {
    server node-exporter:9100;
    keepalive 8;
  }

  server {
    listen 9100;

    location = /metrics {
      proxy_pass http://node_exporter;
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_cache ne;
      proxy_cache_key "node-metrics";          # constant key: all hosts share one entry
      proxy_cache_valid 200 2s;                # refresh node-exporter at most every 2s
      proxy_cache_lock on;                     # coalesce concurrent misses into one fetch
      proxy_cache_lock_timeout 5s;
      proxy_cache_use_stale updating error timeout;
      proxy_cache_background_update on;        # serve stale instantly, refresh behind it
      add_header X-Cache $upstream_cache_status;
    }

    location / { return 200 "ok\n"; }
  }
}
