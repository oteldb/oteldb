# Realistic, self-contained PromQL benchmark of oteldb's embedded storage engine.
#
# This is the docker-compose counterpart to internal/storagebackend/bench_suite_test.go: where that
# test measures server-side engine cost in-process (no network, no caps), this measures the full
# HTTP path the cross-engine benchmark records — live node_exporter → vmagent (BENCH_NODES synthetic
# hosts) → Prometheus remote-write → oteldb `--embedded` on the `file` backend under GOMAXPROCS /
# GOMEMLIMIT caps, queried over the Prometheus HTTP API by `otelbench promql bench`.
#
# It is the realistic loop for iterating on storage/engine changes: numbers here are directly
# comparable to a cell in /src/oteldb/benchmark/results/REPORT.md (same ingest path, same caps, same
# query suite, same HTTP measurement), without standing up the whole benchctl matrix.
#
#   ./run.sh                         # BENCH_NODES=10, prewarm 90s, bench 20 runs
#   BENCH_NODES=100 ./run.sh         # match REPORT.md cardinality (~140k series)
#   GOMEMLIMIT=2GiB ./run.sh         # tune the cap
#   CLEANUP=0 ./run.sh               # leave the stack up to re-run queries / grab pprof
volumes:
  oteldb-data: # the embedded `file` backend's data dir (parts live here across restarts)

services:
  # The real node_exporter — one instance, scraped once per ~2s via the cache below.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command: ["--web.max-requests=40"]

  # Caching proxy: vmagent's BENCH_NODES synthetic hosts all scrape node-cache:9100 and get the same
  # one cached node-exporter response (refreshed at most every 2s), so the host count scales without
  # melting the single exporter. Lifted verbatim from the benchmark (config/nginx/node-cache.conf).
  node-cache:
    image: nginx:1.27-alpine
    depends_on: [node-exporter]
    volumes:
      - ./node-cache.conf:/etc/nginx/nginx.conf:ro

  # vmagent turns one node-exporter into BENCH_NODES hosts (distinct instance labels in scrape.yml,
  # generated by run.sh) and remote-writes the live, current-timestamp, in-order stream to oteldb.
  vmagent:
    image: victoriametrics/vmagent:v1.106.1
    depends_on: [node-cache]
    volumes:
      - ./vmagent-scrape.yml:/etc/vmagent/scrape.yml:ro
    command:
      - -promscrape.config=/etc/vmagent/scrape.yml
      - -remoteWrite.url=http://oteldb:19291/api/v1/write
    ports: ["127.0.0.1:8429:8429"]

  # oteldb on the embedded engine (--embedded ⇒ `file` backend, no ClickHouse), capped to the same
  # GOMAXPROCS / GOMEMLIMIT the benchmark applies via BENCH_CPUS / BENCH_MEMLIMIT. The PromQL HTTP
  # API is on :9090; Prometheus remote-write ingest on :19291; pprof on :9010 for profiling runs.
  #
  # Build: the binary is compiled on the host by run.sh (`go build -o oteldb`) and this image just
  # COPYs it (./Dockerfile) — so `up --build` is instant and a host rebuild swaps oteldb in place.
  oteldb:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - --config=/etc/otel/cfg.yml
      - --embedded
    volumes:
      - ./oteldb.yml:/etc/otel/cfg.yml:ro
      - oteldb-data:/data
    environment:
      - PPROF_ADDR=0.0.0.0:9010
      - OTEL_LOG_LEVEL=info
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_TRACES_EXPORTER=none
      # Caps — the dominant driver of REPORT.md p90 alongside dataset scale. Override per run.
      - GOMAXPROCS=${GOMAXPROCS:-4}
      - GOMEMLIMIT=${GOMEMLIMIT:-1GiB}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:13133/liveness"]
      interval: 1s
      timeout: 1s
      retries: 60
    ports:
      - "127.0.0.1:9090:9090"   # PromQL HTTP API (what otelbench drives)
      - "127.0.0.1:9010:9010"   # pprof (go tool pprof http://localhost:9010)
      - "127.0.0.1:13133:13133" # health check (/liveness, /readiness) — published for run.sh's poll
      - "127.0.0.1:19291:19291" # Prometheus remote-write ingest
