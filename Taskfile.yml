# https://taskfile.dev
version: "3"

env:
  GO111MODULE: on
  GOPROXY: https://proxy.golang.org,direct
  IMAGE: '{{default "registry.localhost/oteldb/oteldb" .IMAGE}}'

vars:
  DOCKER: '{{default "docker" .DOCKER}}'
  REGISTRY:
    sh: 'printf "%s" "${REGISTRY:-}"'
  TAG:
    sh: git log --pretty='%h' -1
  PUSH_ARG:
    sh: 'if [[ -n "${PUSH:-}" ]]; then echo "--push"; fi'

tasks:
  setup:
    desc: Install dependencies
    cmds:
      - go mod tidy

  build:
    desc: Build the binary
    sources:
      - ./**/*.go
    generates:
      - ./oteldb
    cmds:
      - go build -o ./oteldb ./cmd/oteldb

  build:odbagent:
    desc: Build the odbagent binary
    sources:
      - ./**/*.go
    generates:
      - ./bin/odbagent
    cmds:
      - mkdir -p ./bin
      - go build -o ./bin/odbagent ./cmd/odbagent

  build-deploy:
    desc: Build binaries for deploy images
    env:
      CGO_ENABLED: 0
    cmds:
      - |
        set -e
        for target in oteldb odbbackup odbrestore odbmigrate otelproxy chotel odbagent; do
          go build -trimpath -buildvcs=false -v -o ./$target ./cmd/$target
        done

  deploy:images:
    desc: Build deploy images, set PUSH=1 to push
    deps:
      - build-deploy
    preconditions:
      - sh: test -n "${REGISTRY:-}"
        msg: "REGISTRY is required, for example: REGISTRY=ghcr.io/oteldb"
    cmds:
      - task: deploy:image:oteldb
      - for: [chotel]
        task: deploy:image:generic
        vars:
          BINARY: "{{.ITEM}}"
      - task: deploy:image:odbagent

  deploy:image:oteldb:
    desc: Build the oteldb deploy image
    preconditions:
      - sh: test -n "${REGISTRY:-}"
        msg: "REGISTRY is required, for example: REGISTRY=ghcr.io/oteldb"
    cmds:
      - '{{.DOCKER}} build -t "{{.REGISTRY}}/oteldb:{{.TAG}}" {{.PUSH_ARG}} -f dev/deploy/deploy.Dockerfile .'

  deploy:image:generic:
    desc: Build a generic single-binary deploy image (pass BINARY=xxx)
    preconditions:
      - sh: test -n "${REGISTRY:-}"
        msg: "REGISTRY is required, for example: REGISTRY=ghcr.io/oteldb"
    cmds:
      - '{{.DOCKER}} build -t "{{.REGISTRY}}/{{.BINARY}}:{{.TAG}}" {{.PUSH_ARG}} --build-arg BINARY={{.BINARY}} -f dev/deploy/deploy.generic.Dockerfile .'

  deploy:image:odbagent:
    desc: Build the odbagent deploy image
    preconditions:
      - sh: test -n "${REGISTRY:-}"
        msg: "REGISTRY is required, for example: REGISTRY=ghcr.io/oteldb"
    cmds:
      - '{{.DOCKER}} build -t "{{.REGISTRY}}/odbagent:{{.TAG}}" {{.PUSH_ARG}} -f dev/deploy/deploy.odbagent.Dockerfile .'

  test:
    desc: Run tests
    env:
      LC_ALL: C
    vars:
      TEST_OPTIONS: '{{default "" .TEST_OPTIONS}}'
      SOURCE_FILES: '{{default "./..." .SOURCE_FILES}}'
      TEST_PATTERN: '{{default "." .TEST_PATTERN}}'
    cmds:
      - go test {{.TEST_OPTIONS}} -failfast -race -coverpkg=./... -covermode=atomic -coverprofile=coverage.txt {{.SOURCE_FILES}} -run {{.TEST_PATTERN}} -timeout=5m

  cover:
    desc: Open the cover tool
    cmds:
      - go tool cover -html=coverage.txt

  fmt:
    desc: format all code
    cmds:
      - golangci-lint fmt ./...

  lint:
    desc: Lint the code with golangci-lint
    cmds:
      - golangci-lint run ./...

  ci:
    desc: Run all CI steps
    cmds:
      - task: setup
      - task: build
      - task: test

  default:
    desc: Runs the default tasks
    cmds:
      - task: ci

  release:
    desc: Create a new tag
    vars:
      NEXT:
        sh: svu n
    cmds:
      - git tag {{.NEXT}}
      - echo {{.NEXT}}
      - git push origin --tags

  goreleaser:test:
    desc: Test built linux packages
    cmds:
      - task: goreleaser:test:apk
      - task: goreleaser:test:deb
      - task: goreleaser:test:rpm

  goreleaser:
    desc: Run GoReleaser either in snapshot or release mode
    deps:
      - build
    env:
      IMAGE: '{{default "localhost/oteldb" .IMAGE}}'
    vars:
      SNAPSHOT:
        sh: 'if [[ $GITHUB_REF != refs/tags/v* ]]; then echo "--snapshot"; fi'
    cmds:
      - goreleaser release --clean --timeout 60m {{.SNAPSHOT}}
