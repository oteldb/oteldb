# Default values for oteldb.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# oteldb runs as a single node backed by the embedded github.com/oteldb/storage
# engine with on-disk persistence. Scaling beyond a single replica requires the
# clustered storage backend and is intentionally not supported by this chart yet.
replicaCount: 1

image:
  repository: ghcr.io/oteldb/oteldb
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP

# Persistence for the embedded storage engine's data directory (config.storage.dir).
# A PersistentVolumeClaim is created from a volumeClaimTemplate on the StatefulSet.
persistence:
  enabled: true
  # Use an existing PersistentVolumeClaim instead of creating one. When set, size,
  # storageClass and accessModes below are ignored.
  existingClaim: ""
  # storageClass for the provisioned volume. "" uses the cluster default; "-" disables
  # dynamic provisioning.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 50Gi
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

env:
  - name: OTEL_LOG_LEVEL
    value: "DEBUG"

config:
  # Serve every signal from the embedded github.com/oteldb/storage engine, so no
  # external ClickHouse is required. Set any of these to "clickhouse" (and provide a
  # dsn) to serve that signal from ClickHouse instead.
  metrics_backend: storage
  traces_backend: storage
  logs_backend: storage
  profiles_backend: storage
  # Embedded storage engine configuration. The "file" backend persists parts and the
  # write-ahead log under dir, which is backed by the persistent volume above.
  storage:
    backend: file
    dir: /var/lib/oteldb
  tempo:
    bind: 0.0.0.0:3200
  prometheus:
    bind: 0.0.0.0:9090
    max_samples: 1_000_000
    timeout: 1m
    enable_negative_offset: true
  loki:
    bind: 0.0.0.0:3100
  pyroscope:
    bind: 0.0.0.0:4040
  health_check:
    bind: 0.0.0.0:13133

nodeSelector: {}

tolerations: []

affinity: {}
